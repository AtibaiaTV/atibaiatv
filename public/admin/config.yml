backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: noticias
    label: Notícias
    folder: src/content/noticias
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Categoria, name: category, widget: select, options: [Notícias, Cultura, Eventos, Esportes, Turismo, Economia] }
      - { label: Autor, name: author, widget: string, default: Redação Atibaia TV }
      - { label: Data, name: date, widget: datetime }
      - { label: Imagem de capa, name: thumbnail, widget: image, required: false }
      - { label: Conteúdo, name: body, widget: markdown }
      - { label: Destaque, name: featured, widget: boolean, default: false }
